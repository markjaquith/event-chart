<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Date Range Event Chart</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #fffaf3;
      --ink: #25211d;
      --muted: #766d63;
      --line: #d7cab9;
      --accent: #254f6e;
      --shadow: 0 20px 60px rgb(65 48 28 / 14%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgb(255 250 243 / 42%), transparent 26rem),
        linear-gradient(135deg, #e9dfd0, #dccfbd);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: 100%;
      min-height: 100vh;
      padding: 0;
    }

    header {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.94;
      letter-spacing: -0.08em;
      max-width: 760px;
    }

    .lede {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 0;
      align-items: start;
      min-height: 100vh;
    }

    .panel {
      background: transparent;
      border-right: 1px solid rgb(86 63 38 / 12%);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow: auto;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-grid.single {
      grid-template-columns: 1fr;
      margin-bottom: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fffdf9;
      color: var(--ink);
      padding: 9px 11px;
    }

    input[type="color"] {
      padding: 4px;
    }

    .events-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .events-heading h2 {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    button {
      border: 0;
      border-radius: 5px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 750;
      padding: 10px 14px;
    }

    button.secondary {
      background: #d6c3aa;
      color: var(--ink);
      border: 1px solid rgb(37 33 29 / 18%);
    }

    button.secondary:hover,
    button.secondary:focus-visible {
      background: #c9b392;
    }

    .file-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .file-status {
      margin: 8px 0 0;
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    body.drag-over .chart-card,
    body.drag-over .panel {
      outline: 2px dashed var(--accent);
      outline-offset: -8px;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .event-row {
      display: grid;
      grid-template-columns: 1fr 1fr 44px;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgb(86 63 38 / 10%);
      border-radius: 5px;
      background: rgb(255 255 255 / 50%);
    }

    .event-row label.wide {
      grid-column: 1 / -1;
    }

    .event-row button {
      align-self: end;
      min-height: 42px;
      padding: 0;
      background: transparent;
      color: #b02f26;
      font-size: 1.35rem;
      line-height: 1;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .event-row button:hover,
    .event-row button:focus-visible {
      background: rgb(176 47 38 / 10%);
      color: #d6382b;
      transform: scale(1.08);
    }

    .event-insert {
      justify-self: center;
      width: 28px;
      min-height: 28px;
      padding: 0;
      overflow: hidden;
      background: rgb(37 79 110 / 16%);
      color: var(--accent);
      font-size: 0.84rem;
      transition: width 160ms ease, background 160ms ease, color 160ms ease;
      white-space: nowrap;
    }

    .event-insert::before {
      content: '+';
    }

    .event-insert:hover,
    .event-insert:focus-visible {
      width: 108px;
      background: var(--accent);
      color: white;
    }

    .event-insert:hover::before,
    .event-insert:focus-visible::before {
      content: 'Add Event';
    }

    #addEvent {
      justify-self: center;
      margin-top: 12px;
    }

    .chart-card {
      background: rgb(255 250 243 / 88%);
      min-height: 100vh;
      padding: 24px;
      overflow-x: auto;
    }

    .chart-title {
      margin: 0 0 16px;
      max-width: none;
      width: 100%;
      color: var(--ink);
      font-size: clamp(1.6rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -0.05em;
      text-align: center;
    }

    .chart-wrap {
      min-width: 760px;
      width: 100%;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .empty {
      display: grid;
      min-height: 360px;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    .axis-text {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .event-label {
      fill: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .event-date {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .segment-label {
      fill: #fffaf3;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.02em;
      paint-order: stroke;
      stroke: rgb(37 33 29 / 35%);
      stroke-linejoin: round;
      stroke-width: 3px;
      text-anchor: middle;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="workspace">
      <form class="panel" id="controls">
        <div class="field-grid single">
          <label>
            Chart name
            <input type="text" id="chartName" placeholder="Date range chart">
          </label>
        </div>

        <div class="field-grid">
          <label>
            Range start
            <input type="date" id="rangeStart" required>
          </label>
          <label>
            Range end
            <input type="date" id="rangeEnd" required>
          </label>
        </div>

        <div class="file-actions">
          <button type="button" class="secondary" id="openFile">Open</button>
          <button type="button" id="saveFile">Save</button>
        </div>
        <input type="file" id="fileInput" accept="application/json,.json" hidden>
        <p class="file-status" id="fileStatus" aria-live="polite"></p>

        <div class="events-heading">
          <h2>Events</h2>
        </div>

        <div class="event-list" id="eventList"></div>
        <button type="button" id="addEvent">Add Event</button>

      </form>

      <section class="chart-card" aria-label="Date range chart preview">
        <div class="chart-wrap">
          <h1 class="chart-title" id="chartNameDisplay"></h1>
          <div id="chart"></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const DAY = 24 * 60 * 60 * 1000;
    const chartName = document.querySelector('#chartName');
    const chartNameDisplay = document.querySelector('#chartNameDisplay');
    const rangeStart = document.querySelector('#rangeStart');
    const rangeEnd = document.querySelector('#rangeEnd');
    const eventList = document.querySelector('#eventList');
    const chart = document.querySelector('#chart');
    const addEvent = document.querySelector('#addEvent');
    const openFile = document.querySelector('#openFile');
    const saveFile = document.querySelector('#saveFile');
    const fileInput = document.querySelector('#fileInput');
    const fileStatus = document.querySelector('#fileStatus');
    const STORAGE_KEY = 'dateRangeCalloutChart:v1';

    const defaultState = {
      name: 'Date range chart',
      rangeStart: '2026-01-01',
      rangeEnd: '2026-06-30',
      events: [
        { label: 'Kickoff', segmentLabel: '', date: '2026-01-15', color: '#4d8f78' },
        { label: 'Design Freeze', segmentLabel: '', date: '2026-03-01', color: '#d9874a' },
        { label: 'Launch', segmentLabel: '', date: '2026-05-20', color: '#7d6cc8' }
      ]
    };

    const savedState = loadState();
    let events = savedState.events;

    chartName.value = savedState.name;
    rangeStart.value = savedState.rangeStart;
    rangeEnd.value = savedState.rangeEnd;

    function parseDate(value) {
      return new Date(`${value}T00:00:00`);
    }

    function isValidDate(date) {
      return date instanceof Date && !Number.isNaN(date.valueOf());
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: 'short' });
    }

    function yearLabel(date) {
      return date.toLocaleDateString(undefined, { year: 'numeric' });
    }

    function normalizeState(raw) {
      if (!raw || !Array.isArray(raw.events)) return structuredClone(defaultState);

      return {
        name: raw.name || defaultState.name,
        rangeStart: raw.rangeStart || defaultState.rangeStart,
        rangeEnd: raw.rangeEnd || defaultState.rangeEnd,
        events: raw.events.map((event) => ({
          label: event.label || '',
          segmentLabel: event.segmentLabel || '',
          date: event.date || '',
          color: /^#[0-9a-f]{6}$/i.test(event.color) ? event.color : '#254f6e'
        }))
      };
    }

    function loadState() {
      try {
        return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
      } catch {
        return structuredClone(defaultState);
      }
    }

    function currentState() {
      return {
        name: chartName.value,
        rangeStart: rangeStart.value,
        rangeEnd: rangeEnd.value,
        events
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState()));
    }

    function applyState(state) {
      const normalized = normalizeState(state);
      events = normalized.events;
      chartName.value = normalized.name;
      rangeStart.value = normalized.rangeStart;
      rangeEnd.value = normalized.rangeEnd;
      normalizeRangeToEvents();
      sortEventsChronologically();
      saveState();
      updateChartNameDisplay();
      renderControls();
      renderChart();
    }

    function updateChartNameDisplay() {
      chartNameDisplay.textContent = chartName.value.trim() || defaultState.name;
    }

    function filenameSafeName(value) {
      const safe = value.trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return safe || 'date-range-chart';
    }

    function setFileStatus(message) {
      fileStatus.textContent = message;
    }

    function saveJsonFile() {
      sortEventsChronologically();
      saveState();

      const blob = new Blob([`${JSON.stringify(currentState(), null, 2)}\n`], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${filenameSafeName(chartName.value)}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      setFileStatus('Saved JSON file.');
    }

    function openJsonFile(file) {
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.json')) {
        setFileStatus('Please open a .json file.');
        return;
      }

      const reader = new FileReader();
      reader.addEventListener('load', () => {
        try {
          applyState(JSON.parse(reader.result));
          setFileStatus(`Opened ${file.name}.`);
        } catch {
          setFileStatus('Could not open that JSON file.');
        }
      });
      reader.addEventListener('error', () => setFileStatus('Could not read that file.'));
      reader.readAsText(file);
    }

    function normalizeRangeToEvents() {
      const dates = events
        .map((event) => parseDate(event.date))
        .filter(isValidDate)
        .sort((a, b) => a - b);

      if (!dates.length) return;

      const earliest = dates[0];
      const latest = dates[dates.length - 1];
      const start = parseDate(rangeStart.value);
      const end = parseDate(rangeEnd.value);

      if (!rangeStart.value || !isValidDate(start) || earliest < start) {
        rangeStart.value = eventsDateValue(earliest);
      }

      if (!rangeEnd.value || !isValidDate(end) || latest > end) {
        rangeEnd.value = eventsDateValue(latest);
      }
    }

    function eventsDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function sortEventsChronologically() {
      events.sort((a, b) => {
        const aDate = parseDate(a.date);
        const bDate = parseDate(b.date);

        if (isValidDate(aDate) && isValidDate(bDate)) return aDate - bDate;
        if (isValidDate(aDate)) return -1;
        if (isValidDate(bDate)) return 1;
        return 0;
      });
    }

    function nextEventDate() {
      const dates = events
        .map((event) => parseDate(event.date))
        .filter(isValidDate)
        .sort((a, b) => a - b);

      if (!dates.length) return rangeStart.value;

      const next = new Date(dates[dates.length - 1]);
      next.setMonth(next.getMonth() + 1);
      return eventsDateValue(next);
    }

    function midpointEventDate(before, after) {
      const beforeDate = parseDate(before.date);
      const afterDate = parseDate(after.date);

      if (!isValidDate(beforeDate) || !isValidDate(afterDate)) return nextEventDate();

      return eventsDateValue(new Date((beforeDate.getTime() + afterDate.getTime()) / 2));
    }

    function addNewEvent(date) {
      events.push({ label: 'New event', segmentLabel: '', date, color: '#254f6e' });
      normalizeRangeToEvents();
      saveState();
      renderControls();
      renderChart();
    }

    function renderControls() {
      sortEventsChronologically();
      eventList.innerHTML = '';

      events.forEach((event, index) => {
        const row = document.createElement('div');
        row.className = 'event-row';
        row.innerHTML = `
          <label class="wide">
            Title
            <input type="text" value="${escapeHtml(event.label)}" data-field="label" data-index="${index}">
          </label>
          <label class="wide">
            Segment label
            <input type="text" value="${escapeHtml(event.segmentLabel || '')}" data-field="segmentLabel" data-index="${index}">
          </label>
          <label>
            Date
            <input type="date" value="${event.date}" data-field="date" data-index="${index}">
          </label>
          <label>
            Color
            <input type="color" value="${event.color}" data-field="color" data-index="${index}">
          </label>
          <button type="button" aria-label="Remove ${escapeHtml(event.label)}" data-remove="${index}">&times;</button>
        `;
        eventList.append(row);

        if (index + 1 < events.length) {
          const insert = document.createElement('button');
          insert.type = 'button';
          insert.className = 'event-insert';
          insert.dataset.addBetween = index;
          insert.setAttribute('aria-label', `Add event between ${event.label || 'this event'} and ${events[index + 1].label || 'next event'}`);
          eventList.append(insert);
        }
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function getValidEvents(start, end) {
      return events
        .filter((event) => event.label.trim() && event.date)
        .map((event) => ({ ...event, parsed: parseDate(event.date) }))
        .filter((event) => event.parsed >= start && event.parsed <= end)
        .sort((a, b) => a.parsed - b.parsed);
    }

    function monthTicks(start, end) {
      const ticks = [];
      const cursor = new Date(start.getFullYear(), start.getMonth(), 1);
      if (cursor < start) cursor.setMonth(cursor.getMonth() + 1);

      while (cursor <= end) {
        ticks.push(new Date(cursor));
        cursor.setMonth(cursor.getMonth() + 1);
      }

      return ticks;
    }

    function renderChart() {
      const start = parseDate(rangeStart.value);
      const end = parseDate(rangeEnd.value);

      if (!rangeStart.value || !rangeEnd.value || end <= start) {
        chart.innerHTML = '<div class="empty">Choose a valid start and end date.</div>';
        return;
      }

      const validEvents = getValidEvents(start, end);
      const total = Math.max(1, end - start);
      const width = 960;
      const height = 500;
      const left = 44;
      const right = 28;
      const chartWidth = width - left - right;
      const barY = 310;
      const barHeight = 42;
      const labelBaseY = 68;

      const x = (date) => left + ((date - start) / total) * chartWidth;
      const segments = [];
      const sortedStarts = validEvents.length
        ? validEvents
        : [{ label: 'Range', parsed: start, color: '#254f6e' }];

      if (sortedStarts[0].parsed > start) {
        segments.push({ from: start, to: sortedStarts[0].parsed, color: '#c8baa6' });
      }

      sortedStarts.forEach((event, index) => {
        segments.push({
          from: event.parsed,
          to: index + 1 < sortedStarts.length ? sortedStarts[index + 1].parsed : end,
          color: event.color,
          label: event.segmentLabel || ''
        });
      });

      const segmentMarkup = segments.map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        return `<rect x="${sx}" y="${barY}" width="${Math.max(2, ex - sx)}" height="${barHeight}" fill="${segment.color}" />`;
      }).join('');

      const segmentLabels = segments.filter((segment) => segment.label.trim()).map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        const labelX = sx + (ex - sx) / 2;
        return `<text class="segment-label" x="${labelX}" y="${barY + barHeight / 2}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(segment.label)}</text>`;
      }).join('');

      const ticks = monthTicks(start, end).map((tick) => {
        const tx = x(tick);
        const yearMarkup = tick.getMonth() === 0
          ? `<text class="axis-text" x="${tx}" y="${barY + barHeight + 52}" text-anchor="middle">${yearLabel(tick)}</text>`
          : '';
        return `
          <line x1="${tx}" y1="${barY - 12}" x2="${tx}" y2="${barY + barHeight + 12}" stroke="#6f665d" stroke-width="1" opacity="0.2" />
          <text class="axis-text" x="${tx}" y="${barY + barHeight + 34}" text-anchor="middle">${monthLabel(tick)}</text>
          ${yearMarkup}
        `;
      }).join('');

      const callouts = validEvents.map((event, index) => {
        const cx = x(event.parsed);
        const labelY = labelBaseY + (index % 4) * 48 - 10;
        const connectorTopY = labelY + 30;
        let labelX = cx;
        let textAnchor = 'middle';

        if (cx < left + 90) {
          labelX = cx;
          textAnchor = 'start';
        } else if (cx > width - right - 90) {
          labelX = cx;
          textAnchor = 'end';
        }

        return `
          <line x1="${cx}" y1="${barY}" x2="${cx}" y2="${connectorTopY}" stroke="${event.color}" stroke-width="2" />
          <circle cx="${cx}" cy="${barY}" r="5" fill="${event.color}" stroke="#fffaf3" stroke-width="3" />
          <text class="event-label" x="${labelX}" y="${labelY}" text-anchor="${textAnchor}">${escapeHtml(event.label)}</text>
          <text class="event-date" x="${labelX}" y="${labelY + 16}" text-anchor="${textAnchor}">${formatDate(event.parsed)}</text>
        `;
      }).join('');

      chart.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Horizontal date range chart" aria-describedby="chartDesc">
          <desc id="chartDesc">A date range split into colored segments based on event dates.</desc>
          <defs>
            <clipPath id="barClip">
              <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" rx="5" />
            </clipPath>
          </defs>
          <g>${ticks}</g>
          <line x1="${left}" y1="${barY + barHeight / 2}" x2="${width - right}" y2="${barY + barHeight / 2}" stroke="#b8a891" stroke-width="1" />
          <g clip-path="url(#barClip)">${segmentMarkup}</g>
          <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" fill="none" stroke="#3a3027" stroke-width="2" rx="5" />
          <g clip-path="url(#barClip)">${segmentLabels}</g>
          <g>${callouts}</g>
        </svg>
      `;
    }

    addEvent.addEventListener('click', () => {
      addNewEvent(nextEventDate());
    });

    chartName.addEventListener('input', () => {
      updateChartNameDisplay();
      saveState();
    });

    saveFile.addEventListener('click', saveJsonFile);
    openFile.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      openJsonFile(fileInput.files[0]);
      fileInput.value = '';
    });

    document.addEventListener('dragover', (event) => {
      event.preventDefault();
      document.body.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (event) => {
      if (!event.relatedTarget) document.body.classList.remove('drag-over');
    });

    document.addEventListener('drop', (event) => {
      event.preventDefault();
      document.body.classList.remove('drag-over');
      openJsonFile(event.dataTransfer.files[0]);
    });

    eventList.addEventListener('input', (event) => {
      const index = Number(event.target.dataset.index);
      const field = event.target.dataset.field;
      if (!Number.isNaN(index) && field) {
        events[index][field] = event.target.value;
        normalizeRangeToEvents();
        saveState();
        if (field === 'date') renderControls();
        renderChart();
      }
    });

    eventList.addEventListener('click', (event) => {
      const insertButton = event.target.closest('[data-add-between]');
      if (insertButton) {
        const index = Number(insertButton.dataset.addBetween);
        if (!Number.isNaN(index) && events[index] && events[index + 1]) {
          addNewEvent(midpointEventDate(events[index], events[index + 1]));
        }
        return;
      }

      const removeButton = event.target.closest('[data-remove]');
      const removeIndex = Number(removeButton?.dataset.remove);
      if (!Number.isNaN(removeIndex)) {
        events.splice(removeIndex, 1);
        saveState();
        renderControls();
        renderChart();
      }
    });

    rangeStart.addEventListener('input', () => {
      normalizeRangeToEvents();
      saveState();
      renderChart();
    });
    rangeEnd.addEventListener('input', () => {
      normalizeRangeToEvents();
      saveState();
      renderChart();
    });

    normalizeRangeToEvents();
    sortEventsChronologically();
    saveState();
