<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Chart</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #fffaf3;
      --ink: #25211d;
      --muted: #766d63;
      --line: #d7cab9;
      --accent: #254f6e;
      --shadow: 0 20px 60px rgb(65 48 28 / 14%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgb(255 250 243 / 42%), transparent 26rem),
        linear-gradient(135deg, #e9dfd0, #dccfbd);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: 100%;
      min-height: 100vh;
      padding: 0;
    }

    header {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.94;
      letter-spacing: -0.08em;
      max-width: 760px;
    }

    .lede {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 0;
      align-items: start;
      min-height: 100vh;
    }

    .panel {
      background: transparent;
      border-right: 1px solid rgb(86 63 38 / 12%);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow: auto;
    }

    .panel-fade {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 360px;
      height: 64px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 140ms ease;
      background: linear-gradient(to bottom, rgb(225 214 197 / 0%), #e1d6c5 78%);
      z-index: 3;
    }

    .panel-fade.visible {
      opacity: 1;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-grid.single {
      grid-template-columns: 1fr;
      margin-bottom: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #fffdf9;
      color: var(--ink);
      padding: 9px 11px;
    }

    input[type="color"] {
      padding: 4px;
    }

    .events-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .events-heading h2 {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    button {
      border: 0;
      border-radius: 5px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 750;
      padding: 10px 14px;
    }

    button.secondary {
      background: #d6c3aa;
      color: var(--ink);
      border: 1px solid rgb(37 33 29 / 18%);
    }

    button.secondary:hover,
    button.secondary:focus-visible {
      background: #c9b392;
    }

    .file-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .export-downloads {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    .export-downloads button {
      box-shadow: 0 10px 28px rgb(37 33 29 / 18%);
    }

    .file-status {
      margin: 8px 0 0;
      min-height: 1.2em;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    body.drag-over .chart-card,
    body.drag-over .panel {
      outline: 2px dashed var(--accent);
      outline-offset: -8px;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .event-row {
      display: grid;
      grid-template-columns: 1fr 1fr 44px;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgb(86 63 38 / 10%);
      border-radius: 5px;
      background: rgb(255 255 255 / 50%);
    }

    .event-row label.wide {
      grid-column: 1 / -1;
    }

    .event-row button {
      align-self: end;
      min-height: 42px;
      padding: 0;
      background: transparent;
      color: #b02f26;
      font-size: 1.35rem;
      line-height: 1;
      transition: background 140ms ease, color 140ms ease;
    }

    .event-row button:hover,
    .event-row button:focus-visible {
      background: rgb(176 47 38 / 10%);
      color: #d6382b;
    }

    .event-insert {
      justify-self: center;
      width: 28px;
      min-height: 28px;
      padding: 0;
      overflow: hidden;
      background: rgb(37 79 110 / 16%);
      color: var(--accent);
      font-size: 0.84rem;
      transition: width 160ms ease 300ms, background 160ms ease 300ms, color 160ms ease 300ms;
      white-space: nowrap;
    }

    .event-insert::before {
      content: '+';
      transition: content 0s linear 300ms;
    }

    .event-insert:hover,
    .event-insert:focus-visible {
      width: 108px;
      background: var(--accent);
      color: white;
      transition-delay: 0ms;
    }

    .event-insert:hover::before,
    .event-insert:focus-visible::before {
      content: 'Add Event';
      transition-delay: 0ms;
    }

    #addEvent {
      justify-self: center;
      margin-top: 12px;
    }

    .chart-card {
      background: rgb(255 250 243 / 88%);
      min-height: 100vh;
      padding: 24px;
      overflow-x: auto;
    }

    .chart-title {
      margin: 0 0 16px;
      max-width: none;
      width: 100%;
      text-align: center;
    }

    .chart-title-editor {
      display: inline-grid;
      width: min(640px, 100%);
      padding: 6px 10px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .chart-title-editor:hover,
    .chart-title-editor:focus-within {
      background: rgb(255 250 243 / 94%);
      border-color: rgb(86 63 38 / 18%);
      box-shadow: 0 8px 22px rgb(65 48 28 / 10%);
    }

    .chart-title-text,
    .chart-title-input {
      grid-area: 1 / 1;
      width: 100%;
      height: 1.15em;
      color: var(--ink);
      font-size: clamp(1.6rem, 3vw, 3rem);
      font-weight: 750;
      line-height: 1.15;
      letter-spacing: -0.025em;
      text-align: center;
    }

    .chart-title-input {
      min-height: 0;
      border: 0;
      border-radius: 3px;
      background: transparent;
      padding: 0;
      visibility: hidden;
      appearance: none;
    }

    .chart-title-input:focus {
      outline: 0;
      background: white;
    }

    .chart-title-editor:hover .chart-title-text,
    .chart-title-editor:focus-within .chart-title-text {
      visibility: hidden;
    }

    .chart-title-editor:hover .chart-title-input,
    .chart-title-editor:focus-within .chart-title-input {
      visibility: visible;
    }

    .chart-wrap {
      min-width: 760px;
      width: 100%;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .empty {
      display: grid;
      min-height: 360px;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    .axis-text {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .chart-event-editor {
      position: relative;
      width: 100%;
      padding: 4px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .chart-event-editor:hover,
    .chart-event-editor:focus-within {
      background: rgb(255 250 243 / 94%);
      border-color: rgb(86 63 38 / 18%);
      box-shadow: 0 8px 22px rgb(65 48 28 / 10%);
    }

    .chart-event-editor input {
      display: block;
      min-height: 0;
      border: 0;
      border-radius: 3px;
      background: transparent;
      padding: 1px 2px;
      text-align: inherit;
    }

    .chart-event-editor input:focus {
      outline: 0;
      background: white;
    }

    .chart-event-display-title,
    .chart-event-display-date {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chart-event-display-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .chart-event-display-date {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .chart-event-inputs {
      display: none;
    }

    .chart-event-editor:hover .chart-event-display,
    .chart-event-editor:focus-within .chart-event-display {
      display: none;
    }

    .chart-event-editor:hover .chart-event-inputs,
    .chart-event-editor:focus-within .chart-event-inputs {
      display: block;
    }

    .chart-event-title-input {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .chart-event-date-input {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .event-dot {
      cursor: ew-resize;
      transition: r 120ms ease, stroke-width 120ms ease, filter 120ms ease;
    }

    .event-dot:hover,
    .event-dot:focus-visible,
    body.dragging-event-dot .event-dot[data-dragging="true"] {
      r: 8px;
      stroke-width: 4px;
      filter: drop-shadow(0 3px 5px rgb(37 33 29 / 35%));
    }

    .segment-label {
      fill: #fffaf3;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.02em;
      paint-order: stroke;
      stroke: rgb(37 33 29 / 35%);
      stroke-linejoin: round;
      stroke-width: 3px;
      text-anchor: middle;
    }

    .segment-label-editor {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 6px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      transition: background 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .segment-label-editor:hover,
    .segment-label-editor:focus-within {
      background: rgb(255 250 243 / 18%);
      border-color: rgb(255 250 243 / 45%);
      box-shadow: 0 6px 16px rgb(37 33 29 / 18%);
    }

    .segment-label-display,
    .segment-label-input {
      width: 100%;
      color: #fffaf3;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-align: center;
      text-shadow: 0 1px 2px rgb(37 33 29 / 55%);
    }

    .segment-label-display {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .segment-label-input {
      display: none;
      min-height: 0;
      border: 0;
      border-radius: 3px;
      background: rgb(255 255 255 / 92%);
      color: var(--ink);
      padding: 1px 3px;
      text-shadow: none;
    }

    .segment-label-input:focus {
      outline: 0;
    }

    .segment-label-editor:hover .segment-label-display,
    .segment-label-editor:focus-within .segment-label-display {
      display: none;
    }

    .segment-label-editor:hover .segment-label-input,
    .segment-label-editor:focus-within .segment-label-input {
      display: block;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .panel-fade {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="workspace">
      <form class="panel" id="controls">
        <div class="field-grid single">
          <label>
            Chart name
            <input type="text" id="chartName" placeholder="Date range chart">
          </label>
        </div>

        <div class="field-grid">
          <label>
            Range start
            <input type="date" id="rangeStart" required>
          </label>
          <label>
            Range end
            <input type="date" id="rangeEnd" required>
          </label>
        </div>

        <div class="file-actions">
          <button type="button" class="secondary" id="openFile">Open</button>
          <button type="button" id="saveFile">Save</button>
        </div>
        <input type="file" id="fileInput" accept="application/json,.json" hidden>
        <p class="file-status" id="fileStatus" aria-live="polite"></p>

        <div class="events-heading">
          <h2>Events</h2>
        </div>

        <div class="event-list" id="eventList"></div>
        <button type="button" id="addEvent">Add Event</button>

      </form>
      <div class="panel-fade" id="panelFade" aria-hidden="true"></div>

      <section class="chart-card" aria-label="Date range chart preview">
        <div class="chart-wrap">
          <h1 class="chart-title">
            <span class="chart-title-editor">
              <span class="chart-title-text" id="chartNameDisplay"></span>
              <input class="chart-title-input" type="text" id="chartNameInline" aria-label="Edit chart name">
            </span>
          </h1>
          <div id="chart"></div>
        </div>
      </section>
    </section>
    <div class="export-downloads">
      <button type="button" class="secondary" id="downloadSvg">Download SVG</button>
      <button type="button" id="downloadPng">Download PNG</button>
    </div>
  </main>

  <script>
    const DAY = 24 * 60 * 60 * 1000;
    const chartName = document.querySelector('#chartName');
    const chartNameDisplay = document.querySelector('#chartNameDisplay');
    const chartNameInline = document.querySelector('#chartNameInline');
    const rangeStart = document.querySelector('#rangeStart');
    const rangeEnd = document.querySelector('#rangeEnd');
    const controls = document.querySelector('#controls');
    const eventList = document.querySelector('#eventList');
    const panelFade = document.querySelector('#panelFade');
    const chart = document.querySelector('#chart');
    const addEvent = document.querySelector('#addEvent');
    const openFile = document.querySelector('#openFile');
    const saveFile = document.querySelector('#saveFile');
    const downloadSvg = document.querySelector('#downloadSvg');
    const downloadPng = document.querySelector('#downloadPng');
    const fileInput = document.querySelector('#fileInput');
    const fileStatus = document.querySelector('#fileStatus');
    const STORAGE_KEY = 'dateRangeCalloutChart:v1';
    let eventDotDrag = null;

    const defaultState = {
      name: 'Date range chart',
      rangeStart: '2026-01-01',
      rangeEnd: '2026-06-30',
      events: [
        { id: 'event-kickoff', label: 'Kickoff', segmentLabel: '', date: '2026-01-15', color: '#4d8f78' },
        { id: 'event-design-freeze', label: 'Design Freeze', segmentLabel: '', date: '2026-03-01', color: '#d9874a' },
        { id: 'event-launch', label: 'Launch', segmentLabel: '', date: '2026-05-20', color: '#7d6cc8' }
      ]
    };

    const savedState = loadState();
    let events = savedState.events;

    chartName.value = savedState.name;
    rangeStart.value = savedState.rangeStart;
    rangeEnd.value = savedState.rangeEnd;

    function parseDate(value) {
      return new Date(`${value}T00:00:00`);
    }

    function isValidDate(date) {
      return date instanceof Date && !Number.isNaN(date.valueOf());
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: 'short' });
    }

    function yearLabel(date) {
      return date.toLocaleDateString(undefined, { year: 'numeric' });
    }

    function textSvg(value) {
      return escapeHtml(value);
    }

    function normalizeState(raw) {
      if (!raw || !Array.isArray(raw.events)) return structuredClone(defaultState);

      return {
        name: raw.name || defaultState.name,
        rangeStart: raw.rangeStart || defaultState.rangeStart,
        rangeEnd: raw.rangeEnd || defaultState.rangeEnd,
        events: raw.events.map((event) => ({
          id: event.id || createEventId(),
          label: event.label || '',
          segmentLabel: event.segmentLabel || '',
          date: event.date || '',
          color: /^#[0-9a-f]{6}$/i.test(event.color) ? event.color : '#254f6e'
        }))
      };
    }

    function createEventId() {
      if (window.crypto?.randomUUID) return window.crypto.randomUUID();
      return `event-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadState() {
      try {
        return normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
      } catch {
        return structuredClone(defaultState);
      }
    }

    function currentState() {
      return {
        name: chartName.value,
        rangeStart: rangeStart.value,
        rangeEnd: rangeEnd.value,
        events
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState()));
    }

    function applyState(state) {
      const normalized = normalizeState(state);
      events = normalized.events;
      chartName.value = normalized.name;
      rangeStart.value = normalized.rangeStart;
      rangeEnd.value = normalized.rangeEnd;
      normalizeRangeToEvents();
      sortEventsChronologically();
      saveState();
      updateChartNameDisplay();
      syncChartNameInline();
      renderControls();
      renderChart();
      updatePanelFade();
    }

    function updateChartNameDisplay() {
      const name = String(chartName.value || '').trim() || defaultState.name;
      chartNameDisplay.textContent = name;
    }

    function syncChartNameInline() {
      chartNameInline.value = chartName.value;
    }

    function filenameSafeName(value) {
      const safe = String(value || '').trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return safe || 'date-range-chart';
    }

    function setFileStatus(message) {
      fileStatus.textContent = message;
    }

    function updatePanelFade() {
      const hasMore = controls.scrollTop + controls.clientHeight < controls.scrollHeight - 2;
      panelFade.classList.toggle('visible', hasMore);
    }

    function saveJsonFile() {
      sortEventsChronologically();
      saveState();

      const blob = new Blob([`${JSON.stringify(currentState(), null, 2)}\n`], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${filenameSafeName(chartName.value)}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      setFileStatus('Saved JSON file.');
    }

    function downloadBlob(blob, filename) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function exportChartSvg() {
      const start = parseDate(rangeStart.value);
      const end = parseDate(rangeEnd.value);

      if (!rangeStart.value || !rangeEnd.value || end <= start) return '';

      const validEvents = getValidEvents(start, end);
      const total = Math.max(1, end - start);
      const width = 1200;
      const height = 650;
      const left = 56;
      const right = 36;
      const chartWidth = width - left - right;
      const barY = 410;
      const barHeight = 54;
      const labelBaseY = 118;
      const x = (date) => left + ((date - start) / total) * chartWidth;
      const segments = [];
      const sortedStarts = validEvents.length
        ? validEvents
        : [{ label: 'Range', parsed: start, color: '#254f6e' }];

      if (sortedStarts[0].parsed > start) {
        segments.push({ from: start, to: sortedStarts[0].parsed, color: '#c8baa6', label: '' });
      }

      sortedStarts.forEach((event, index) => {
        segments.push({
          from: event.parsed,
          to: index + 1 < sortedStarts.length ? sortedStarts[index + 1].parsed : end,
          color: event.color,
          label: event.segmentLabel || ''
        });
      });

      const segmentMarkup = segments.map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        return `<rect x="${sx}" y="${barY}" width="${Math.max(2, ex - sx)}" height="${barHeight}" fill="${segment.color}" />`;
      }).join('');

      const segmentLabels = segments.filter((segment) => String(segment.label || '').trim()).map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        const labelX = sx + (ex - sx) / 2;
        return `<text x="${labelX}" y="${barY + barHeight / 2}" text-anchor="middle" dominant-baseline="middle" fill="#fffaf3" font-size="19" font-weight="850" letter-spacing="0.02em" paint-order="stroke" stroke="rgb(37 33 29 / 35%)" stroke-linejoin="round" stroke-width="4">${textSvg(segment.label)}</text>`;
      }).join('');

      const ticks = monthTicks(start, end).map((tick) => {
        const tx = x(tick);
        const yearMarkup = tick.getMonth() === 0
          ? `<text x="${tx}" y="${barY + barHeight + 66}" text-anchor="middle" fill="#766d63" font-size="17" font-weight="650">${yearLabel(tick)}</text>`
          : '';
        return `
          <line x1="${tx}" y1="${barY - 14}" x2="${tx}" y2="${barY + barHeight + 14}" stroke="#6f665d" stroke-width="1" opacity="0.2" />
          <text x="${tx}" y="${barY + barHeight + 43}" text-anchor="middle" fill="#766d63" font-size="17" font-weight="650">${monthLabel(tick)}</text>
          ${yearMarkup}
        `;
      }).join('');

      const callouts = validEvents.map((event, index) => {
        const cx = x(event.parsed);
        const labelY = labelBaseY + (index % 4) * 58;
        const connectorTopY = labelY + 38;
        let labelX = cx;
        let textAnchor = 'middle';

        if (cx < left + 110) {
          textAnchor = 'start';
        } else if (cx > width - right - 110) {
          textAnchor = 'end';
        }

        return `
          <line x1="${cx}" y1="${barY}" x2="${cx}" y2="${connectorTopY}" stroke="${event.color}" stroke-width="3" />
          <circle cx="${cx}" cy="${barY}" r="7" fill="${event.color}" stroke="#fffaf3" stroke-width="4" />
          <text x="${labelX}" y="${labelY}" text-anchor="${textAnchor}" fill="#25211d" font-size="18" font-weight="800">${textSvg(event.label)}</text>
          <text x="${labelX}" y="${labelY + 24}" text-anchor="${textAnchor}" fill="#766d63" font-size="16" font-weight="650">${formatDate(event.parsed)}</text>
        `;
      }).join('');

      const title = textSvg(String(chartName.value || '').trim() || defaultState.name);

      return `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}">
          <rect width="100%" height="100%" fill="#fffaf3" />
          <text x="${width / 2}" y="82" text-anchor="middle" fill="#25211d" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="750" letter-spacing="-0.025em">${title}</text>
          <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
            <defs>
              <clipPath id="exportBarClip">
                <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" rx="5" />
              </clipPath>
            </defs>
            <g>${ticks}</g>
            <line x1="${left}" y1="${barY + barHeight / 2}" x2="${width - right}" y2="${barY + barHeight / 2}" stroke="#b8a891" stroke-width="1" />
            <g clip-path="url(#exportBarClip)">${segmentMarkup}</g>
            <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" fill="none" stroke="#3a3027" stroke-width="2" rx="5" />
            <g clip-path="url(#exportBarClip)">${segmentLabels}</g>
            <g>${callouts}</g>
          </g>
        </svg>
      `;
    }

    function downloadPngFile() {
      const svgMarkup = exportChartSvg();
      if (!svgMarkup) {
        setFileStatus('Choose a valid date range before exporting PNG.');
        return;
      }

      const svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      const image = new Image();

      image.addEventListener('load', () => {
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = image.width * scale;
        canvas.height = image.height * scale;

        const context = canvas.getContext('2d');
        context.scale(scale, scale);
        context.drawImage(image, 0, 0);
        URL.revokeObjectURL(url);

        canvas.toBlob((blob) => {
          if (!blob) {
            setFileStatus('Could not create PNG.');
            return;
          }

          downloadBlob(blob, `${filenameSafeName(chartName.value)}.png`);
        }, 'image/png');
      });

      image.addEventListener('error', () => {
        URL.revokeObjectURL(url);
        setFileStatus('Could not export PNG.');
      });

      image.src = url;
    }

    function downloadSvgFile() {
      const svgMarkup = exportChartSvg();
      if (!svgMarkup) {
        setFileStatus('Choose a valid date range before exporting SVG.');
        return;
      }

      const blob = new Blob([`${svgMarkup}\n`], { type: 'image/svg+xml;charset=utf-8' });
      downloadBlob(blob, `${filenameSafeName(chartName.value)}.svg`);
    }

    function openJsonFile(file) {
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.json')) {
        setFileStatus('Please open a .json file.');
        return;
      }

      const reader = new FileReader();
      reader.addEventListener('load', () => {
        try {
          applyState(JSON.parse(reader.result));
          setFileStatus(`Opened ${file.name}.`);
        } catch {
          setFileStatus('Could not open that JSON file.');
        }
      });
      reader.addEventListener('error', () => setFileStatus('Could not read that file.'));
      reader.readAsText(file);
    }

    function normalizeRangeToEvents() {
      const dates = events
        .map((event) => parseDate(event.date))
        .filter(isValidDate)
        .sort((a, b) => a - b);

      if (!dates.length) return;

      const earliest = dates[0];
      const latest = dates[dates.length - 1];
      const start = parseDate(rangeStart.value);
      const end = parseDate(rangeEnd.value);

      if (!rangeStart.value || !isValidDate(start) || earliest < start) {
        rangeStart.value = eventsDateValue(earliest);
      }

      if (!rangeEnd.value || !isValidDate(end) || latest > end) {
        rangeEnd.value = eventsDateValue(latest);
      }
    }

    function eventsDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function sortEventsChronologically() {
      events.sort((a, b) => {
        const aDate = parseDate(a.date);
        const bDate = parseDate(b.date);

        if (isValidDate(aDate) && isValidDate(bDate)) return aDate - bDate;
        if (isValidDate(aDate)) return -1;
        if (isValidDate(bDate)) return 1;
        return 0;
      });
    }

    function nextEventDate() {
      const dates = events
        .map((event) => parseDate(event.date))
        .filter(isValidDate)
        .sort((a, b) => a - b);

      if (!dates.length) return rangeStart.value;

      const next = new Date(dates[dates.length - 1]);
      next.setMonth(next.getMonth() + 1);
      return eventsDateValue(next);
    }

    function midpointEventDate(before, after) {
      const beforeDate = parseDate(before.date);
      const afterDate = parseDate(after.date);

      if (!isValidDate(beforeDate) || !isValidDate(afterDate)) return nextEventDate();

      return eventsDateValue(new Date((beforeDate.getTime() + afterDate.getTime()) / 2));
    }

    function addNewEvent(date) {
      events.push({ id: createEventId(), label: 'New event', segmentLabel: '', date, color: '#254f6e' });
      normalizeRangeToEvents();
      saveState();
      renderControls();
      renderChart();
    }

    function updateEvent(eventId, field, value) {
      const event = events.find((item) => item.id === eventId);
      if (!event) return;

      event[field] = value;
      normalizeRangeToEvents();
      saveState();
      renderControls();
    }

    function dateFromChartPointer(clientX) {
      const svg = chart.querySelector('svg');
      if (!svg) return '';

      const rect = svg.getBoundingClientRect();
      const left = Number(svg.dataset.chartLeft);
      const right = Number(svg.dataset.chartRight);
      const start = Number(svg.dataset.rangeStart);
      const end = Number(svg.dataset.rangeEnd);
      const svgX = ((clientX - rect.left) / rect.width) * 960;
      const clampedX = Math.max(left, Math.min(right, svgX));
      const progress = (clampedX - left) / (right - left);
      const dayOffset = Math.round(((end - start) * progress) / DAY);

      return eventsDateValue(new Date(start + dayOffset * DAY));
    }

    function updateDraggedEventDate(clientX) {
      if (!eventDotDrag) return;

      const date = dateFromChartPointer(clientX);
      if (!date || date === eventDotDrag.lastDate) return;

      eventDotDrag.lastDate = date;
      updateEvent(eventDotDrag.eventId, 'date', date);
      renderChart();
      chart.querySelector(`[data-drag-event="${eventDotDrag.eventId}"]`)?.setAttribute('data-dragging', 'true');
    }

    function renderControls() {
      sortEventsChronologically();
      eventList.innerHTML = '';

      events.forEach((event, index) => {
        const row = document.createElement('div');
        row.className = 'event-row';
        row.innerHTML = `
          <label class="wide">
            Title
            <input type="text" value="${escapeHtml(event.label)}" data-field="label" data-index="${index}">
          </label>
          <label class="wide">
            Segment label
            <input type="text" value="${escapeHtml(event.segmentLabel || '')}" data-field="segmentLabel" data-index="${index}">
          </label>
          <label>
            Date
            <input type="date" value="${event.date}" data-field="date" data-index="${index}">
          </label>
          <label>
            Color
            <input type="color" value="${event.color}" data-field="color" data-index="${index}">
          </label>
          <button type="button" aria-label="Remove ${escapeHtml(event.label)}" data-remove="${index}">&times;</button>
        `;
        eventList.append(row);

        if (index + 1 < events.length) {
          const insert = document.createElement('button');
          insert.type = 'button';
          insert.className = 'event-insert';
          insert.dataset.addBetween = index;
          insert.setAttribute('aria-label', `Add event between ${event.label || 'this event'} and ${events[index + 1].label || 'next event'}`);
          eventList.append(insert);
        }
      });
      requestAnimationFrame(updatePanelFade);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function getValidEvents(start, end) {
      return events
        .filter((event) => String(event.label || '').trim() && event.date)
        .map((event) => ({ ...event, parsed: parseDate(event.date) }))
        .filter((event) => event.parsed >= start && event.parsed <= end)
        .sort((a, b) => a.parsed - b.parsed);
    }

    function monthTicks(start, end) {
      const ticks = [];
      const cursor = new Date(start.getFullYear(), start.getMonth(), 1);
      if (cursor < start) cursor.setMonth(cursor.getMonth() + 1);

      while (cursor <= end) {
        ticks.push(new Date(cursor));
        cursor.setMonth(cursor.getMonth() + 1);
      }

      return ticks;
    }

    function renderChart() {
      const start = parseDate(rangeStart.value);
      const end = parseDate(rangeEnd.value);

      if (!rangeStart.value || !rangeEnd.value || end <= start) {
        chart.innerHTML = '<div class="empty">Choose a valid start and end date.</div>';
        return;
      }

      const validEvents = getValidEvents(start, end);
      const total = Math.max(1, end - start);
      const width = 960;
      const height = 500;
      const left = 44;
      const right = 28;
      const chartWidth = width - left - right;
      const barY = 310;
      const barHeight = 42;
      const labelBaseY = 68;

      const x = (date) => left + ((date - start) / total) * chartWidth;
      const segments = [];
      const sortedStarts = validEvents.length
        ? validEvents
        : [{ label: 'Range', parsed: start, color: '#254f6e' }];

      if (sortedStarts[0].parsed > start) {
        segments.push({ from: start, to: sortedStarts[0].parsed, color: '#c8baa6' });
      }

      sortedStarts.forEach((event, index) => {
        segments.push({
          from: event.parsed,
          to: index + 1 < sortedStarts.length ? sortedStarts[index + 1].parsed : end,
          color: event.color,
          eventId: event.id,
          label: event.segmentLabel || ''
        });
      });

      const segmentMarkup = segments.map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        return `<rect x="${sx}" y="${barY}" width="${Math.max(2, ex - sx)}" height="${barHeight}" fill="${segment.color}" />`;
      }).join('');

      const segmentLabels = segments.filter((segment) => String(segment.label || '').trim()).map((segment) => {
        const sx = x(segment.from);
        const ex = x(segment.to);
        const labelX = sx + (ex - sx) / 2;
        const editorWidth = Math.min(Math.max(ex - sx - 16, 80), 220);
        return `
          <foreignObject x="${labelX - editorWidth / 2}" y="${barY + 6}" width="${editorWidth}" height="${barHeight - 12}">
            <div class="segment-label-editor" xmlns="http://www.w3.org/1999/xhtml">
              <div class="segment-label-display">${escapeHtml(segment.label)}</div>
              <input class="segment-label-input" type="text" value="${escapeHtml(segment.label)}" data-chart-event="${segment.eventId}" data-field="segmentLabel" aria-label="Edit segment label">
            </div>
          </foreignObject>
        `;
      }).join('');

      const ticks = monthTicks(start, end).map((tick) => {
        const tx = x(tick);
        const yearMarkup = tick.getMonth() === 0
          ? `<text class="axis-text" x="${tx}" y="${barY + barHeight + 52}" text-anchor="middle">${yearLabel(tick)}</text>`
          : '';
        return `
          <line x1="${tx}" y1="${barY - 12}" x2="${tx}" y2="${barY + barHeight + 12}" stroke="#6f665d" stroke-width="1" opacity="0.2" />
          <text class="axis-text" x="${tx}" y="${barY + barHeight + 34}" text-anchor="middle">${monthLabel(tick)}</text>
          ${yearMarkup}
        `;
      }).join('');

      const callouts = validEvents.map((event, index) => {
        const cx = x(event.parsed);
        const labelY = labelBaseY + (index % 4) * 48 - 10;
        const connectorTopY = labelY + 30;
        const editorWidth = 190;
        const editorHeight = 48;
        let editorX = cx - editorWidth / 2;
        let align = 'center';

        if (cx < left + 90) {
          editorX = cx - 4;
          align = 'left';
        } else if (cx > width - right - 90) {
          editorX = cx - editorWidth + 4;
          align = 'right';
        }

        return `
          <line x1="${cx}" y1="${barY}" x2="${cx}" y2="${connectorTopY}" stroke="${event.color}" stroke-width="2" />
          <circle class="event-dot" data-drag-event="${event.id}" cx="${cx}" cy="${barY}" r="5" fill="${event.color}" stroke="#fffaf3" stroke-width="3" tabindex="0" aria-label="Drag ${escapeHtml(event.label)} date" />
          <foreignObject x="${editorX}" y="${labelY - 18}" width="${editorWidth}" height="${editorHeight}">
            <div class="chart-event-editor" style="text-align: ${align};" xmlns="http://www.w3.org/1999/xhtml">
              <div class="chart-event-display">
                <div class="chart-event-display-title">${escapeHtml(event.label)}</div>
                <div class="chart-event-display-date">${formatDate(event.parsed)}</div>
              </div>
              <div class="chart-event-inputs">
                <input class="chart-event-title-input" type="text" value="${escapeHtml(event.label)}" data-chart-event="${event.id}" data-field="label" aria-label="Edit ${escapeHtml(event.label)} title">
                <input class="chart-event-date-input" type="date" value="${event.date}" data-chart-event="${event.id}" data-field="date" aria-label="Edit ${escapeHtml(event.label)} date">
              </div>
            </div>
          </foreignObject>
        `;
      }).join('');

      chart.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" data-chart-left="${left}" data-chart-right="${width - right}" data-range-start="${start.getTime()}" data-range-end="${end.getTime()}" role="img" aria-label="Horizontal date range chart" aria-describedby="chartDesc">
          <desc id="chartDesc">A date range split into colored segments based on event dates.</desc>
          <defs>
            <clipPath id="barClip">
              <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" rx="5" />
            </clipPath>
          </defs>
          <g>${ticks}</g>
          <line x1="${left}" y1="${barY + barHeight / 2}" x2="${width - right}" y2="${barY + barHeight / 2}" stroke="#b8a891" stroke-width="1" />
          <g clip-path="url(#barClip)">${segmentMarkup}</g>
          <rect x="${left}" y="${barY}" width="${chartWidth}" height="${barHeight}" fill="none" stroke="#3a3027" stroke-width="2" rx="5" />
          <g clip-path="url(#barClip)">${segmentLabels}</g>
          <g>${callouts}</g>
        </svg>
      `;
    }

    addEvent.addEventListener('click', () => {
      addNewEvent(nextEventDate());
    });

    chartName.addEventListener('input', () => {
      updateChartNameDisplay();
      syncChartNameInline();
      saveState();
    });

    chartNameInline.addEventListener('input', () => {
      chartName.value = chartNameInline.value;
      updateChartNameDisplay();
      saveState();
    });

    chartNameInline.addEventListener('blur', syncChartNameInline);

    controls.addEventListener('scroll', updatePanelFade);
    window.addEventListener('resize', updatePanelFade);

    saveFile.addEventListener('click', saveJsonFile);
    downloadSvg.addEventListener('click', downloadSvgFile);
    downloadPng.addEventListener('click', downloadPngFile);
    openFile.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      openJsonFile(fileInput.files[0]);
      fileInput.value = '';
    });

    document.addEventListener('dragover', (event) => {
      event.preventDefault();
      document.body.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (event) => {
      if (!event.relatedTarget) document.body.classList.remove('drag-over');
    });

    document.addEventListener('drop', (event) => {
      event.preventDefault();
      document.body.classList.remove('drag-over');
      openJsonFile(event.dataTransfer.files[0]);
    });

    chart.addEventListener('pointerdown', (event) => {
      const dot = event.target.closest('[data-drag-event]');
      if (!dot) return;

      event.preventDefault();
      eventDotDrag = {
        eventId: dot.dataset.dragEvent,
        lastDate: events.find((item) => item.id === dot.dataset.dragEvent)?.date || ''
      };
      dot.setPointerCapture?.(event.pointerId);
      dot.setAttribute('data-dragging', 'true');
      document.body.classList.add('dragging-event-dot');
    });

    window.addEventListener('pointermove', (event) => {
      updateDraggedEventDate(event.clientX);
    });

    window.addEventListener('pointerup', () => {
      if (!eventDotDrag) return;

      eventDotDrag = null;
      document.body.classList.remove('dragging-event-dot');
      renderControls();
      renderChart();
    });

    chart.addEventListener('input', (event) => {
      const input = event.target.closest('[data-chart-event]');
      if (!input) return;

      updateEvent(input.dataset.chartEvent, input.dataset.field, input.value);
    });

    chart.addEventListener('change', (event) => {
      const input = event.target.closest('[data-chart-event]');
      if (!input) return;

      updateEvent(input.dataset.chartEvent, input.dataset.field, input.value);
    });

    chart.addEventListener('focusout', (event) => {
      const editor = event.target.closest('.chart-event-editor, .segment-label-editor');
      if (!editor || editor.contains(event.relatedTarget)) return;

      renderChart();
    });

    eventList.addEventListener('input', (event) => {
      const index = Number(event.target.dataset.index);
      const field = event.target.dataset.field;
      if (!Number.isNaN(index) && field) {
        events[index][field] = event.target.value;
        normalizeRangeToEvents();
        saveState();
        if (field === 'date') renderControls();
        renderChart();
      }
    });

    eventList.addEventListener('click', (event) => {
      const insertButton = event.target.closest('[data-add-between]');
      if (insertButton) {
        const index = Number(insertButton.dataset.addBetween);
        if (!Number.isNaN(index) && events[index] && events[index + 1]) {
          addNewEvent(midpointEventDate(events[index], events[index + 1]));
        }
        return;
      }

      const removeButton = event.target.closest('[data-remove]');
      const removeIndex = Number(removeButton?.dataset.remove);
      if (!Number.isNaN(removeIndex)) {
        events.splice(removeIndex, 1);
        saveState();
        renderControls();
        renderChart();
      }
    });

    rangeStart.addEventListener('input', () => {
      normalizeRangeToEvents();
      saveState();
      renderChart();
    });
    rangeEnd.addEventListener('input', () => {
      normalizeRangeToEvents();
      saveState();
      renderChart();
    });

    normalizeRangeToEvents();
    sortEventsChronologically();
    saveState();
    updateChartNameDisplay();
    syncChartNameInline();
    renderControls();
    renderChart();
    updatePanelFade();
  </script>
</body>
</html>
